apiVersion: v1
kind: Service
metadata:
  name: elektronik-ingress
spec:
  selector:
    app: elektronik # Harus sesuai dengan label di Pod/Deployment kamu
  ports:
    - protocol: TCP
      port: 80         # Port yang diakses dari luar
      targetPort: 8080 # Port aplikasi di dalam container
  type: LoadBalancer   # WAJIB agar muncul di minikube tunnel